name: Build APK

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options: [debug, release]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '13.0'
          accept-android-sdk-licenses: true
          packages: >-
            platforms;android-35
            build-tools;35.0.0
            platform-tools

      - name: Install Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Regenerate Gradle wrapper (fix corrupted JAR)
        run: |
          gradle wrapper --gradle-version 8.9 --distribution-type bin
          chmod +x gradlew
          echo "Wrapper JAR size: $(wc -c < gradle/wrapper/gradle-wrapper.jar) bytes"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Download MediaPipe model
        run: |
          mkdir -p app/src/main/assets
          wget -q \
            "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_full/float16/latest/pose_landmarker_full.task" \
            -O app/src/main/assets/pose_landmarker_full.task
          ls -lh app/src/main/assets/

      - name: Determine build type
        id: type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ inputs.build_type }}" >> $GITHUB_OUTPUT
          else
            echo "type=debug" >> $GITHUB_OUTPUT
          fi

      - name: Build Debug APK
        if: steps.type.outputs.type == 'debug'
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Release APK
        if: steps.type.outputs.type == 'release'
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Find APKs
        run: find app/build/outputs/apk -name "*.apk" | xargs -I{} ls -lh {}

      - name: Upload Debug APK
        if: steps.type.outputs.type == 'debug'
        uses: actions/upload-artifact@v4
        with:
          name: SkeletonViewer-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK
        if: steps.type.outputs.type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: SkeletonViewer-Release-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: >-
      github.event_name == 'workflow_dispatch' &&
      inputs.build_type == 'release'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: SkeletonViewer-Release-APK
          path: apk/

      - name: Get version
        id: ver
        run: |
          V=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "name=$V" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.name }}-${{ github.run_number }}
          name: Skeleton Viewer v${{ steps.ver.outputs.name }}
          body: |
            ## Skeleton Viewer v${{ steps.ver.outputs.name }}
            
            Real-time body skeleton detection using MediaPipe.
            
            **Install:** Download APK → enable "Unknown sources" → install.
            **Requires:** Android 8.0+ (API 26+), camera permission.
          files: apk/*.apk
